name: Build version tags

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bake-latest:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build (full)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: gui
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v6
          push: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/py-kms:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/py-kms:${{ github.ref_name }}-full
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_REFERENCE=${{ github.ref_name }}
      - name: Build (minimal)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: minimal
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v6
          push: false
          tags: |
            pykmsorg/py-kms:${{ github.ref_name }}-minimal
            ghcr.io/py-kms-organization/py-kms:${{ github.ref_name }}-minimal
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_REFERENCE=${{ github.ref_name }}
